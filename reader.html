<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共读书房 📖</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF0F5;
    --surface: #FFFFFF;
    --surface-2: #FFF7FA;
    --surface-3: #FFF2F7;
    --border: rgba(255, 182, 205, 0.45);
    --border-strong: rgba(255, 105, 160, 0.5);
    --text: #3D2B35;
    --text-dim: #9E7A8A;
    --text-light: #C4A0B0;
    --accent: #FF6B9D;
    --accent-2: #FF8FB3;
    --accent-dark: #E8527A;
    --accent-glow: rgba(255, 107, 157, 0.18);
    --user-bubble: #FFF0F5;
    --user-bubble-border: rgba(255, 150, 180, 0.6);
    --user-text: #C44870;
    --claude-bubble: #F0F4FF;
    --claude-bubble-border: rgba(100, 140, 240, 0.4);
    --claude-text: #3A5AD9;
    --gold: #E8A440;
    --dot-color: rgba(255, 182, 205, 0.55);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg);
    background-image: radial-gradient(var(--dot-color) 1.5px, transparent 1.5px);
    background-size: 22px 22px;
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- NAV ---- */
  .nav {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(16px);
    border-bottom: 1.5px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #FFB3CC, #FF6B9D);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    box-shadow: 0 3px 10px rgba(255, 107, 157, 0.35);
    flex-shrink: 0;
  }
  .nav-title {
    font-size: 15px;
    font-weight: 800;
    background: linear-gradient(135deg, #FF6B9D, #C84B8A);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    flex: 1;
  }
  .nav-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    transition: all .2s;
  }
  .nav-btn:hover { border-color: var(--accent-2); color: var(--accent); }
  .nav-back { display: none; }
  .nav-home-link {
    background: none;
    border: none;
    color: var(--text-light);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    padding: 4px 8px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color .2s;
  }
  .nav-home-link:hover { color: var(--accent); }

  /* ---- LIBRARY ---- */
  #library { padding: 28px 24px; max-width: 860px; margin: 0 auto; }
  .library-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .library-header h2 {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
  }
  .library-header h2 span { color: var(--accent); }
  .import-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff;
    border: none;
    padding: 10px 22px;
    border-radius: 24px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    transition: all .2s;
    box-shadow: 0 4px 14px rgba(255, 107, 157, 0.35);
  }
  .import-btn:hover {
    box-shadow: 0 6px 20px rgba(255, 107, 157, 0.45);
    transform: translateY(-1px);
  }
  .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
  .book-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 20px 16px;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 2px 10px rgba(255, 107, 157, 0.07);
    position: relative;
    overflow: hidden;
  }
  .book-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 18px 18px 0 0;
  }
  .book-card:hover {
    border-color: var(--accent-2);
    box-shadow: 0 6px 20px rgba(255, 107, 157, 0.16);
    transform: translateY(-3px);
  }
  .book-card-emoji {
    font-size: 28px;
    margin-bottom: 10px;
    display: block;
  }
  .book-card-title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text);
  }
  .book-card-meta { font-size: 11px; color: var(--text-light); font-weight: 600; }
  .book-card-progress {
    margin-top: 12px;
    height: 4px;
    background: var(--surface-3);
    border-radius: 2px;
    overflow: hidden;
  }
  .book-card-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 2px;
    transition: width .3s;
  }
  .empty-shelf { text-align: center; padding: 64px 20px; color: var(--text-dim); grid-column: 1/-1; }
  .empty-shelf .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-shelf p { margin-bottom: 20px; font-size: 15px; font-weight: 600; }

  /* ---- READER ---- */
  #reader { display: none; max-width: 680px; margin: 0 auto; padding: 0 24px 100px; }
  .reader-title {
    padding: 24px 0 6px;
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    text-align: center;
  }
  .page-info {
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 28px;
    background: var(--surface);
    display: inline-block;
    padding: 4px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    margin-left: 50%;
    transform: translateX(-50%);
  }
  .paragraph-block { margin-bottom: 8px; position: relative; }
  .paragraph-block.has-annotation { border-left: 3px solid var(--gold); padding-left: 12px; }
  .paragraph-text {
    font-size: 16px;
    line-height: 1.95;
    color: var(--text);
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
    font-family: 'Noto Serif SC', Georgia, serif;
  }
  .paragraph-text:hover { background: rgba(255, 107, 157, 0.06); }
  .paragraph-text.active { background: rgba(255, 107, 157, 0.1); }
  .annotations-area { padding: 4px 0 4px 6px; }
  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.65;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .bubble-user {
    background: var(--user-bubble);
    border: 1.5px solid var(--user-bubble-border);
    color: var(--user-text);
    border-radius: 4px 14px 14px 14px;
  }
  .bubble-claude {
    background: var(--claude-bubble);
    border: 1.5px solid var(--claude-bubble-border);
    color: var(--claude-text);
    border-radius: 14px 4px 14px 14px;
  }
  .bubble-meta {
    font-size: 11px;
    font-weight: 700;
    opacity: .65;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }
  .note-input-area {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-top: 6px;
    display: none;
    box-shadow: 0 4px 16px rgba(255, 107, 157, 0.1);
  }
  .note-input-area.open { display: block; }
  .note-textarea {
    width: 100%;
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    color: var(--user-text);
    font-size: 14px;
    font-weight: 500;
    line-height: 1.65;
    resize: none;
    outline: none;
    font-family: inherit;
    min-height: 70px;
    border-radius: 10px;
    padding: 10px 14px;
    transition: border-color .2s;
  }
  .note-textarea:focus { border-color: var(--accent); }
  .note-textarea::placeholder { color: var(--text-light); }
  .note-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
  .note-cancel {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    transition: all .2s;
  }
  .note-cancel:hover { border-color: var(--accent-2); color: var(--text); }
  .note-submit {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border: none;
    color: #fff;
    padding: 7px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    box-shadow: 0 3px 10px rgba(255, 107, 157, 0.3);
    transition: all .2s;
  }
  .note-submit:hover { box-shadow: 0 5px 14px rgba(255, 107, 157, 0.4); transform: translateY(-1px); }
  .page-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 0 0;
    gap: 12px;
  }
  .page-nav-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    padding: 12px 24px;
    border-radius: 24px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    transition: all .2s;
    flex: 1;
    text-align: center;
    box-shadow: 0 2px 8px rgba(255, 107, 157, 0.06);
  }
  .page-nav-btn:hover:not(:disabled) {
    border-color: var(--accent-2);
    color: var(--accent);
    box-shadow: 0 4px 14px rgba(255, 107, 157, 0.14);
    transform: translateY(-1px);
  }
  .page-nav-btn:disabled { opacity: .35; cursor: default; }

  /* ---- MODAL ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(61, 43, 53, 0.4);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 32px 28px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(255, 107, 157, 0.2);
  }
  .modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .modal-header .modal-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #FFB3CC, #FF6B9D);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
  }
  .modal h3 {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 0;
  }
  .modal-input {
    width: 100%;
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 11px 16px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    outline: none;
    margin-bottom: 14px;
    transition: border-color .2s;
  }
  .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .modal-input::placeholder { color: var(--text-light); }
  .modal-drop {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 16px;
    background: var(--surface-2);
  }
  .modal-drop:hover, .modal-drop.drag {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .modal-drop .drop-icon { font-size: 32px; margin-bottom: 8px; }
  .modal-drop p { color: var(--text-dim); font-size: 14px; font-weight: 600; }
  .modal-drop small { color: var(--text-light); font-size: 12px; }
  .modal-drop input { display: none; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-cancel {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    transition: all .2s;
  }
  .modal-cancel:hover { border-color: var(--accent-2); color: var(--text); }
  .modal-ok {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    box-shadow: 0 4px 14px rgba(255, 107, 157, 0.35);
    transition: all .2s;
  }
  .modal-ok:hover { box-shadow: 0 6px 20px rgba(255, 107, 157, 0.45); transform: translateY(-1px); }
  .modal-ok:disabled { opacity: .5; cursor: default; transform: none; box-shadow: none; }
  .upload-status { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 12px; min-height: 20px; }

  /* ---- TOAST ---- */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: #fff;
    padding: 11px 22px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    z-index: 300;
    box-shadow: 0 6px 24px rgba(61, 43, 53, 0.3);
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* ---- REPLY BUTTON ---- */
  .reply-btn {
    background: var(--claude-bubble);
    border: 1.5px solid var(--claude-bubble-border);
    color: var(--claude-text);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin: 4px 0 8px;
    display: inline-block;
    transition: all .2s;
  }
  .reply-btn:hover {
    background: #E4EAFF;
    border-color: rgba(100, 140, 240, 0.7);
    box-shadow: 0 3px 10px rgba(100, 140, 240, 0.2);
  }

  @media (max-width: 480px) {
    #reader { padding: 0 16px 80px; }
    .paragraph-text { font-size: 15px; }
    .book-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .nav { padding: 12px 16px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">📖</div>
  <button class="nav-btn nav-back" id="navBack" onclick="showLibrary()">← 书架</button>
  <div class="nav-title" id="navTitle">共读书房</div>
  <a href="/dashboard" class="nav-home-link">🏠 主页</a>
</nav>

<div id="library">
  <div class="library-header">
    <h2>书架 <span>🌸</span></h2>
    <button class="import-btn" onclick="openImport()">＋ 导入书籍</button>
  </div>
  <div class="book-grid" id="bookGrid">
    <div class="empty-shelf" id="emptyShelf" style="display:none">
      <div class="empty-icon">📚</div>
      <p>还没有书籍</p>
      <button class="import-btn" onclick="openImport()">导入第一本书</button>
    </div>
  </div>
</div>

<div id="reader">
  <div class="reader-title" id="readerTitle"></div>
  <div class="page-info" id="pageInfo"></div>
  <div id="paragraphList"></div>
  <div class="page-nav">
    <button class="page-nav-btn" id="prevBtn" onclick="changePage(-1)">← 上一页</button>
    <button class="page-nav-btn" id="nextBtn" onclick="changePage(1)">下一页 →</button>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon">📥</div>
      <h3>导入书籍</h3>
    </div>
    <input class="modal-input" id="importTitle" placeholder="书名（可选，默认用文件名）" />
    <div class="modal-drop" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-icon">📄</div>
      <p id="dropText">点击选择 .txt 文件</p>
      <small>或拖拽文件到此处</small>
      <input type="file" id="fileInput" accept=".txt" onchange="onFileSelect(event)" />
    </div>
    <div class="upload-status" id="uploadStatus"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeImport()">取消</button>
      <button class="modal-ok" id="importOkBtn" disabled onclick="doImport()">导入 ✨</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let currentBook = null;
let currentPage = 0;
let totalPages = 0;
let annotations = {};
let activeParaIdx = null;
let selectedFile = null;

const CHUNKS_PER_PAGE = 30;

// Book emojis by index
const BOOK_EMOJIS = ['📕','📗','📘','📙','📓','📔','📒','📃','📜','📄'];

// ---- Auth helpers ----
function getToken() {
  return document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith('ombre_session='))?.split('=')[1] || '';
}
function authHeaders() {
  const t = getToken();
  return t ? { 'Authorization': `Bearer ${t}` } : {};
}

// ---- Toast ----
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

// ---- Library ----
async function loadLibrary() {
  try {
    const r = await fetch('/api/reader/books', { headers: authHeaders() });
    const data = await r.json();
    renderLibrary(data.books || []);
  } catch(e) {
    toast('加载书架失败');
  }
}

function renderLibrary(books) {
  const grid = document.getElementById('bookGrid');
  const empty = document.getElementById('emptyShelf');
  if (!books.length) {
    grid.innerHTML = '';
    grid.appendChild(empty);
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = books.map((b, i) => `
    <div class="book-card" onclick="openBook('${b.id}')">
      <span class="book-card-emoji">${BOOK_EMOJIS[i % BOOK_EMOJIS.length]}</span>
      <div class="book-card-title">${esc(b.title)}</div>
      <div class="book-card-meta">${b.total_chunks} 段${b.char_count ? ' · ' + Math.round(b.char_count/1000) + 'k字' : ''}</div>
      <div class="book-card-progress">
        <div class="book-card-progress-bar" style="width:${Math.round((b.progress||0)*100)}%"></div>
      </div>
    </div>
  `).join('');
}

// ---- Open Book ----
async function openBook(bookId) {
  try {
    const r = await fetch(`/api/reader/books/${bookId}`, { headers: authHeaders() });
    currentBook = await r.json();
    totalPages = Math.ceil(currentBook.total_chunks / CHUNKS_PER_PAGE);
    currentPage = currentBook.last_page || 0;
    await loadAnnotations();
    await renderPage();
    document.getElementById('library').style.display = 'none';
    document.getElementById('reader').style.display = 'block';
    document.getElementById('navBack').style.display = 'inline-block';
    document.getElementById('navTitle').textContent = currentBook.title;
    window.scrollTo(0, 0);
  } catch(e) {
    toast('打开书籍失败');
  }
}

async function loadAnnotations() {
  try {
    const r = await fetch(`/api/reader/annotations/${currentBook.id}`, { headers: authHeaders() });
    const data = await r.json();
    annotations = {};
    (data.annotations || []).forEach(a => {
      const key = a.chunk_index;
      if (!annotations[key]) annotations[key] = [];
      annotations[key].push(a);
    });
  } catch(e) {}
}

async function renderPage() {
  const start = currentPage * CHUNKS_PER_PAGE;
  const r = await fetch(`/api/reader/books/${currentBook.id}/page/${currentPage}`, { headers: authHeaders() });
  const data = await r.json();
  const chunks = data.chunks || [];

  document.getElementById('readerTitle').textContent = currentBook.title;
  document.getElementById('pageInfo').textContent = `第 ${currentPage + 1} / ${totalPages} 页`;

  const list = document.getElementById('paragraphList');
  list.innerHTML = '';

  chunks.forEach((text, i) => {
    const globalIdx = start + i;
    const annots = annotations[globalIdx] || [];
    const hasAnnot = annots.length > 0;

    const block = document.createElement('div');
    block.className = 'paragraph-block' + (hasAnnot ? ' has-annotation' : '');
    block.dataset.idx = globalIdx;

    const para = document.createElement('div');
    para.className = 'paragraph-text';
    para.textContent = text;
    para.onclick = () => toggleNoteInput(globalIdx, para, block);

    block.appendChild(para);

    // Existing annotations
    if (annots.length) {
      const area = document.createElement('div');
      area.className = 'annotations-area';
      annots.forEach(a => {
        const bub = document.createElement('div');
        bub.className = a.author === 'claude' ? 'bubble bubble-claude' : 'bubble bubble-user';
        bub.innerHTML = `<div class="bubble-meta">${a.author === 'claude' ? '🤍 小克' : '🌸 玖瑶'} · ${fmtDate(a.created_at)}</div>${esc(a.text)}`;
        area.appendChild(bub);
        if (a.author === 'user') {
          const alreadyReplied = annots.some(x => x.author === 'claude');
          if (!alreadyReplied) {
            const replyBtn = document.createElement('button');
            replyBtn.className = 'reply-btn';
            replyBtn.textContent = '叫小克来 💬';
            replyBtn.dataset.idx = globalIdx;
            replyBtn.onclick = () => notifyClaudeReply(globalIdx, a.text, replyBtn);
            area.appendChild(replyBtn);
          }
        }
      });
      block.appendChild(area);
    }

    // Note input
    const noteArea = document.createElement('div');
    noteArea.className = 'note-input-area';
    noteArea.id = `note-${globalIdx}`;
    noteArea.innerHTML = `
      <textarea class="note-textarea" placeholder="写下你的想法…" rows="3"></textarea>
      <div class="note-actions">
        <button class="note-cancel" onclick="closeNoteInput(${globalIdx})">取消</button>
        <button class="note-submit" onclick="submitNote(${globalIdx})">留下 🌸</button>
      </div>`;
    block.appendChild(noteArea);

    list.appendChild(block);
  });

  document.getElementById('prevBtn').disabled = currentPage <= 0;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;

  fetch(`/api/reader/progress`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...authHeaders() },
    body: JSON.stringify({ book_id: currentBook.id, page: currentPage })
  }).catch(() => {});
}

function toggleNoteInput(idx, paraEl, block) {
  if (activeParaIdx !== null && activeParaIdx !== idx) {
    const prev = document.getElementById(`note-${activeParaIdx}`);
    if (prev) { prev.classList.remove('open'); prev.querySelector('textarea').value = ''; }
    document.querySelectorAll('.paragraph-text.active').forEach(el => el.classList.remove('active'));
  }
  const area = document.getElementById(`note-${idx}`);
  if (area.classList.contains('open')) {
    area.classList.remove('open');
    paraEl.classList.remove('active');
    activeParaIdx = null;
  } else {
    area.classList.add('open');
    paraEl.classList.add('active');
    area.querySelector('textarea').focus();
    activeParaIdx = idx;
  }
}

function closeNoteInput(idx) {
  const area = document.getElementById(`note-${idx}`);
  if (area) { area.classList.remove('open'); area.querySelector('textarea').value = ''; }
  document.querySelectorAll('.paragraph-text.active').forEach(el => el.classList.remove('active'));
  activeParaIdx = null;
}

async function submitNote(idx) {
  const area = document.getElementById(`note-${idx}`);
  const text = area.querySelector('textarea').value.trim();
  if (!text) return;
  try {
    const r = await fetch('/api/reader/annotations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ book_id: currentBook.id, chunk_index: idx, author: 'user', text })
    });
    if (!r.ok) throw new Error();
    closeNoteInput(idx);
    await loadAnnotations();
    await renderPage();
    toast('已记下 🌸');
  } catch(e) {
    toast('保存失败');
  }
}

async function changePage(delta) {
  currentPage = Math.max(0, Math.min(totalPages - 1, currentPage + delta));
  window.scrollTo(0, 0);
  await renderPage();
}

function showLibrary() {
  document.getElementById('library').style.display = 'block';
  document.getElementById('reader').style.display = 'none';
  document.getElementById('navBack').style.display = 'none';
  document.getElementById('navTitle').textContent = '共读书房';
  currentBook = null;
}

async function notifyClaudeReply(idx, annotText, btn) {
  btn.disabled = true;
  btn.textContent = '通知中…';
  try {
    const r = await fetch('/api/reader/reply-request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({
        book_id: currentBook.id,
        book_title: currentBook.title,
        chunk_index: idx,
        annot_text: annotText
      })
    });
    if (!r.ok) throw new Error();
    btn.textContent = '已通知小克 ✓';
    toast('小克收到了，去告诉他一声让他过来～', 3500);
    pollForReply(idx, btn);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '叫小克来 💬';
    toast('通知失败，试试刷新');
  }
}

function pollForReply(idx, btn) {
  let tries = 0;
  const iv = setInterval(async () => {
    tries++;
    if (tries > 37) { clearInterval(iv); return; }
    try {
      const r = await fetch(`/api/reader/annotations/${currentBook.id}`, { headers: authHeaders() });
      const data = await r.json();
      const hasClaudeReply = (data.annotations || []).some(a => a.chunk_index === idx && a.author === 'claude');
      if (hasClaudeReply) {
        clearInterval(iv);
        await loadAnnotations();
        await renderPage();
        toast('小克回复了！🌸', 3000);
      }
    } catch(e) {}
  }, 8000);
}

// ---- Import ----
function openImport() {
  document.getElementById('importModal').classList.add('open');
  document.getElementById('importTitle').value = '';
  document.getElementById('dropText').textContent = '点击选择 .txt 文件';
  document.getElementById('uploadStatus').textContent = '';
  document.getElementById('importOkBtn').disabled = true;
  selectedFile = null;
}

function closeImport() {
  document.getElementById('importModal').classList.remove('open');
}

function onFileSelect(e) {
  const f = e.target.files[0];
  if (!f) return;
  selectedFile = f;
  document.getElementById('dropText').innerHTML = `<strong>${esc(f.name)}</strong><br><small>${Math.round(f.size/1024)}KB</small>`;
  document.getElementById('importOkBtn').disabled = false;
}

async function doImport() {
  if (!selectedFile) return;
  const btn = document.getElementById('importOkBtn');
  const status = document.getElementById('uploadStatus');
  btn.disabled = true;
  status.textContent = '上传中…';

  const formData = new FormData();
  formData.append('file', selectedFile);
  const title = document.getElementById('importTitle').value.trim() || selectedFile.name.replace(/\.txt$/i, '');
  formData.append('title', title);

  try {
    const token = getToken();
    const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
    const r = await fetch('/api/reader/import', { method: 'POST', headers, body: formData });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || '导入失败');
    status.textContent = `导入成功：${data.total_chunks} 段 🎉`;
    setTimeout(() => { closeImport(); loadLibrary(); }, 1200);
  } catch(e) {
    status.textContent = e.message;
    btn.disabled = false;
  }
}

// Drag and drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) { document.getElementById('fileInput').files = e.dataTransfer.files; onFileSelect({ target: { files: [f] } }); }
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!currentBook) return;
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changePage(-1);
});

// ---- Helpers ----
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

loadLibrary();
</script>
</body>
